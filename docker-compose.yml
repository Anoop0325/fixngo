version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: fixngo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fixngo_db
      POSTGRES_USER: fixngo_user
      POSTGRES_PASSWORD: fixngo_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixngo_user -d fixngo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
